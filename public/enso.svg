<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none" role="img" aria-label="ensō">
  <defs>
    <filter id="enso-rough" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- main brush ring: single path, gap at upper right; pathLength normalized to 1200 for dash animations -->
  <g filter="url(#enso-rough)">
    <path id="enso-path"
      d="M 644.2 259.0
         A 282 282 0 0 1 659.4 494.4
         A 276 276 0 0 1 400.0 684.0
         A 284 284 0 0 1 142.5 493.7
         A 274 274 0 0 1 220.6 186.2
         A 279 279 0 0 1 495.8 136.9"
      pathLength="1200"
      stroke="#2C231A" stroke-width="34" stroke-linecap="round" fill="none"/>
    <!-- dry-brush flying-white streaks at the tail (upper right) -->
    <g stroke="#2C231A" fill="none" stroke-linecap="round">
      <path d="M 508 128 A 279 279 0 0 1 556 152" stroke-width="7" opacity="0.5"/>
      <path d="M 492 120 A 292 292 0 0 1 548 140" stroke-width="4" opacity="0.38"/>
      <path d="M 522 146 A 262 262 0 0 1 566 172" stroke-width="3" opacity="0.3"/>
    </g>
    <!-- thicker wet-bristle accent near the start -->
    <path d="M 640 250 A 288 288 0 0 1 668 330" stroke="#2C231A" stroke-width="10" opacity="0.55" stroke-linecap="round" fill="none"/>
  </g>
</svg>
